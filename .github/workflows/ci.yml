name: CI - Test & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm run test

      - name: Build application
        id: build
        continue-on-error: true
        run: npm run build

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const lintStatus = '${{ steps.lint.outcome }}' === 'success' ? '✅' : '❌';
            const testStatus = '${{ steps.test.outcome }}' === 'success' ? '✅' : '❌';
            const buildStatus = '${{ steps.build.outcome }}' === 'success' ? '✅' : '❌';
            const allPassed = ['${{ steps.lint.outcome }}', '${{ steps.test.outcome }}', '${{ steps.build.outcome }}'].every(s => s === 'success');
            
            const checks = [
              { name: 'Lint', status: lintStatus },
              { name: 'Tests', status: testStatus },
              { name: 'Build', status: buildStatus }
            ];
            
            let comment = '## 🧪 CI Check Results\n\n';
            checks.forEach(check => {
              comment += `- ${check.status} ${check.name}\n`;
            });
            comment += `\n### Node Version: ${{ matrix.node-version }}\n\n`;
            comment += allPassed ? '✨ **All checks passed!**' : '⚠️ **Some checks failed** - please review the logs';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Fail on errors
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
