name: Claude AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request || context.payload.issue;
            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get PR diff
            const { data: prData } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            
            // Get PR files changed
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: prNumber,
            });
            
            core.setOutput('pr_number', prNumber);
            core.setOutput('pr_title', prData.title);
            core.setOutput('pr_body', prData.body || '');
            core.setOutput('files_changed', JSON.stringify(files));
            
            return { prNumber, prData, files };

      - name: Post PR review comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            
            // Post initial comment indicating review in progress
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '🤖 **Claude AI Review in Progress**\n\nAnalyzing PR for code quality, testing, documentation, and best practices...\n\n(This is automated - actual Claude analysis would be performed here with Anthropic API)'
            });
            
            core.setOutput('comment_id', comment.id);

      - name: Post review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            
            const reviewSummary = '## 📋 Claude AI Code Review\n\n### Summary\nPR implements feature enhancements with good separation of concerns.\n\n### ✅ Strengths\n- Clear component structure with proper TypeScript types\n- Tailwind CSS used appropriately for styling\n- Tests included for critical paths\n- Responsive design consideration\n\n### 💡 Suggestions\n1. Consider adding JSDoc comments to complex functions\n2. Ensure all new string literals are translatable\n3. Add error boundary for new async operations\n4. Review accessibility attributes (aria-labels) for new interactive elements\n\n### ❓ Questions\n1. Have you tested this with screen readers?\n2. Any performance implications with the new state management?\n\n### 🎯 Risk Level: **Low**\nChanges are well-scoped and backwards compatible.\n\n---\n*Review conducted by Claude AI - This is a simulated response. In a real implementation, you would call the Anthropic API.*';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: reviewSummary
            });
